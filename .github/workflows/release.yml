name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write  # For creating releases and uploading assets
  id-token: write  # For PyPI publishing

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTUP_MAX_RETRIES: 10

jobs:
  # Step 1: Generate release notes and create GitHub release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
    - uses: actions/checkout@v6.0.3
      with:
        fetch-depth: 0  # Need full history for changelog

    - name: Get tag and version info
      id: tag
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        VERSION=${TAG#v}
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Tag: $TAG, Version: $VERSION"

    - name: Generate changelog with git-cliff
      id: git-cliff
      uses: orhun/git-cliff-action@v4
      with:
        config: cliff.toml
        args: --current --strip header
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build release notes
      id: changelog
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CLIFF_OUTPUT: ${{ steps.git-cliff.outputs.content }}
      run: |
        TAG="${{ steps.tag.outputs.tag }}"
        VERSION="${{ steps.tag.outputs.version }}"

        echo "git-cliff content:"
        echo "$CLIFF_OUTPUT"

        # Use git-cliff output or fallback
        if [ -z "$CLIFF_OUTPUT" ]; then
          CLIFF_OUTPUT="- Various improvements and bug fixes"
        fi

        # Build release notes file
        {
          echo "## What's Changed"
          echo ""
          echo "$CLIFF_OUTPUT"
          echo ""
          echo "## Assets"
          echo ""
          echo "### Python Packages"
          echo "- **PyPI**: \`pip install dataprof==$VERSION\`"
          echo "- **GitHub Releases**: Baseline and optimized wheels are attached as release assets"
          echo ""
          echo "### Source Archives"
          echo "- GitHub automatically attaches source \`.tar.gz\` and \`.zip\` archives for this tag"
          echo ""
          echo "### Rust Status"
          echo "- **Crates.io**: \`cargo add dataprof@$VERSION\`"
          echo "- The published \`dataprof\` crate is the stable Rust facade for profiling files, streams, tables, and database queries."
          echo "- Internal workspace crates are published so the facade can depend on versioned packages."
          echo "- This release ships libraries and Python packages; a CLI binary is not part of the release surface."
          echo ""
          echo "## Installation"
          echo ""
          echo "\`\`\`bash"
          echo "# Python package"
          echo "pip install dataprof==$VERSION"
          echo ""
          echo "# Rust library"
          echo "cargo add dataprof@$VERSION"
          echo "\`\`\`"
          echo ""
          echo "---"
          echo ""
          echo "**Full changelog**: [CHANGELOG.md](https://github.com/AndreaBozzo/dataprof/blob/master/CHANGELOG.md)"
        } > release_notes.md

        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        cat release_notes.md >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      run: |
        echo "Creating release ${{ steps.tag.outputs.tag }}..."
        if gh release view ${{ steps.tag.outputs.tag }} >/dev/null 2>&1; then
          gh release edit ${{ steps.tag.outputs.tag }} \
            --title "dataprof ${{ steps.tag.outputs.tag }}" \
            --notes-file release_notes.md \
            --draft=true
        else
          gh release create ${{ steps.tag.outputs.tag }} \
            --title "dataprof ${{ steps.tag.outputs.tag }}" \
            --notes-file release_notes.md \
            --draft
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Step 2: Validate the Rust release surfaces before publishing crates.
  rust-release-checks:
    name: Validate Rust Release Surface
    runs-on: ubuntu-latest
    needs: create-release
    steps:
    - uses: actions/checkout@v6.0.3

    - name: Setup Rust
      uses: ./.github/actions/setup-rust
      with:
        cache-prefix: rust-release
        components: ''
    - name: Verify released facade surface
      run: |
        cargo check --locked -p dataprof --all-features
        cargo check --locked -p dataprof --lib --no-default-features
        cargo check --locked -p dataprof --lib --no-default-features --features async-streaming
        cargo test --locked --test public_api_facade --no-default-features
        cargo test --locked --test public_api_facade --no-default-features --features async-streaming
        cargo test --locked --test public_api_facade --all-features
        cargo test --locked -p dataprof-engines --all-features
        cargo test --locked -p dataprof-parquet --all-features
        cargo test --locked -p dataprof-partial --all-features
        cargo check --locked -p dataprof-python --all-features
      shell: bash

  # Step 3: Verify every crate's packaged contents before the first real publish.
  # Full `cargo publish --dry-run` is not viable for interdependent workspace crates
  # because crates.io cannot resolve unpublished internal versions yet.
  rust-package-checks:
    name: Check Rust Package Contents
    runs-on: ubuntu-latest
    needs: rust-release-checks
    steps:
    - uses: actions/checkout@v6.0.3

    - name: Setup Rust
      uses: ./.github/actions/setup-rust
      with:
        cache-prefix: rust-package-checks
        components: ''

    - name: Check workspace crate package contents
      run: |
        set -euo pipefail

        check_package_contents() {
          local crate="$1"
          echo "Checking package contents for ${crate}..."
          cargo package -p "${crate}" --list
        }

        check_package_contents dataprof-core
        check_package_contents dataprof-metrics
        check_package_contents dataprof-runtime
        check_package_contents dataprof-csv
        check_package_contents dataprof-json
        check_package_contents dataprof-db
        check_package_contents dataprof-parquet
        check_package_contents dataprof-engines
        check_package_contents dataprof-partial
        check_package_contents dataprof
      shell: bash

  # Step 4: Publish versioned Rust crates in dependency order.
  rust-crates:
    name: Publish Rust Crates
    runs-on: ubuntu-latest
    needs: rust-package-checks
    steps:
    - uses: actions/checkout@v6.0.3

    - name: Setup Rust
      uses: ./.github/actions/setup-rust
      with:
        cache-prefix: rust-publish
        components: ''

    - name: Publish workspace crates
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
      run: |
        set -euo pipefail
        VERSION="${GITHUB_REF#refs/tags/v}"
        PUBLISH_COOLDOWN_SECONDS=60

        if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
          echo "CRATES_TOKEN is required to publish Rust crates"
          exit 1
        fi

        crate_already_published() {
          local crate="$1"
          curl --silent --show-error --fail \
            "https://crates.io/api/v1/crates/${crate}/${VERSION}" >/dev/null 2>&1
        }

        wait_for_rate_limit_window() {
          local output="$1"
          local retry_after
          local now_ts
          local retry_ts
          local sleep_seconds

          retry_after=$(printf '%s\n' "${output}" | sed -n 's/.*Please try again after \(.* GMT\).*/\1/p' | tail -n 1)
          if [ -z "${retry_after}" ]; then
            return 1
          fi

          now_ts=$(date -u +%s)
          retry_ts=$(date -u -d "${retry_after}" +%s 2>/dev/null || true)
          if [ -z "${retry_ts}" ]; then
            return 1
          fi

          sleep_seconds=$((retry_ts - now_ts + 5))
          if [ "${sleep_seconds}" -lt 5 ]; then
            sleep_seconds=5
          fi

          echo "crates.io rate limit hit; waiting ${sleep_seconds}s until ${retry_after} before retrying..."
          sleep "${sleep_seconds}"
          return 0
        }

        publish_crate() {
          local crate="$1"
          if crate_already_published "${crate}"; then
            echo "${crate} v${VERSION} is already published; skipping"
            return 0
          fi

          while true; do
            echo "Publishing ${crate}..."
            set +e
            output=$(cargo publish -p "${crate}" --locked 2>&1)
            status=$?
            set -e
            echo "${output}"

            if [ "${status}" -eq 0 ]; then
              return 0
            fi

            if echo "${output}" | grep -Eiq 'already (uploaded|exists)|crate version .* is already uploaded'; then
              echo "${crate} is already published; continuing"
              return 0
            fi

            if echo "${output}" | grep -q 'status 429 Too Many Requests'; then
              if wait_for_rate_limit_window "${output}"; then
                continue
              fi
            fi

            exit "${status}"
          done
        }

        crates=(
          dataprof-core
          dataprof-metrics
          dataprof-runtime
          dataprof-csv
          dataprof-json
          dataprof-db
          dataprof-parquet
          dataprof-engines
          dataprof-partial
          dataprof
        )

        for index in "${!crates[@]}"; do
          publish_crate "${crates[$index]}"

          if [ "$index" -lt $((${#crates[@]} - 1)) ]; then
            echo "Cooling down ${PUBLISH_COOLDOWN_SECONDS}s before the next crates.io publish attempt..."
            sleep "${PUBLISH_COOLDOWN_SECONDS}"
          fi
        done
      shell: bash

  # Step 5: Build Python wheels for the base public package API.
  python-wheels:
    name: Build Python Wheels (${{ matrix.os }}-${{ matrix.target }}-${{ matrix.cpu_profile }})
    runs-on: ${{ matrix.os }}
    needs: [create-release, rust-release-checks]
    strategy:
      matrix:
        include:
          # Baseline compatibility builds (maximum compatibility)
          - os: ubuntu-latest
            target: x86_64
            cpu_profile: baseline
            rustflags: "-C target-cpu=x86-64 -C target-feature=-avx,-avx2,-avx512f -C opt-level=2"
          - os: ubuntu-latest
            target: aarch64
            cpu_profile: baseline
            rustflags: "-C target-cpu=generic -C opt-level=2"
          - os: windows-latest
            target: x64
            cpu_profile: baseline
            rustflags: "-C target-cpu=x86-64 -C target-feature=-avx,-avx2,-avx512f -C opt-level=2"
          - os: macos-15-intel
            target: x86_64
            cpu_profile: baseline
            rustflags: "-C target-cpu=x86-64 -C target-feature=-avx,-avx2,-avx512f -C opt-level=2"
          - os: macos-latest
            target: aarch64
            cpu_profile: baseline
            rustflags: "-C target-cpu=generic -C opt-level=2"

          # Optimized builds (performance optimized)
          - os: ubuntu-latest
            target: x86_64
            cpu_profile: optimized
            rustflags: "-C target-cpu=native"
          - os: windows-latest
            target: x64
            cpu_profile: optimized
            rustflags: "-C target-cpu=native"
          - os: macos-15-intel
            target: x86_64
            cpu_profile: optimized
            rustflags: "-C target-cpu=native"
          - os: macos-latest
            target: aarch64
            cpu_profile: optimized
            rustflags: "-C target-cpu=native"

    steps:
    - uses: actions/checkout@v6.0.3
    - uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Build wheels (${{ matrix.cpu_profile }})
      uses: PyO3/maturin-action@v1
      with:
        target: ${{ matrix.target }}
        args: --release --out dist --find-interpreter --features python
        sccache: 'true'
        manylinux: auto
        # Ensure compatibility flags are properly set
        rust-toolchain: stable
      env:
        RUSTFLAGS: ${{ matrix.rustflags }}
        # Additional environment variables to ensure compatibility for all targets
        CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: ${{ matrix.rustflags }}
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS: ${{ matrix.rustflags }}
        CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS: ${{ matrix.rustflags }}
        CARGO_TARGET_X86_64_APPLE_DARWIN_RUSTFLAGS: ${{ matrix.rustflags }}
        CARGO_TARGET_AARCH64_APPLE_DARWIN_RUSTFLAGS: ${{ matrix.rustflags }}
        # Disable CPU-specific optimizations in C dependencies (Linux/macOS x86_64 only)
        CFLAGS: ${{ matrix.target == 'x86_64' && '-march=x86-64' || '' }}
        CXXFLAGS: ${{ matrix.target == 'x86_64' && '-march=x86-64' || '' }}
        # Enable forward compatibility for Python versions newer than PyO3 max supported
        PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

    - name: Verify wheel compatibility (baseline only)
      if: matrix.cpu_profile == 'baseline'
      run: |
        # Install objdump/readelf for analysis (Linux only for now)
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          echo "Verifying baseline wheel has no advanced CPU instructions..."
          cd dist

          for wheel in *.whl; do
            if [ -f "$wheel" ]; then
              echo "Analyzing wheel: $wheel"

              # Extract wheel and find .so files
              python -m zipfile -e "$wheel" wheel_extracted/

              # Check for advanced CPU instructions in shared libraries
              find wheel_extracted/ -name "*.so" -exec sh -c '
                echo "Checking $1 for advanced CPU instructions..."
                if objdump -d "$1" 2>/dev/null | grep -E "(vzeroupper|vmovdqu|vpor|vpaddd)" >/dev/null; then
                  echo "WARNING: Found AVX instructions in $1"
                  echo "This wheel may not be compatible with older CPUs"
                else
                  echo "OK: No advanced CPU instructions found in $1"
                fi
              ' _ {} \;

              rm -rf wheel_extracted/
            fi
          done
        else
          echo "Skipping compatibility check on ${{ matrix.os }}"
        fi
      shell: bash

    - name: Rename wheels with CPU profile suffix
      run: |
        cd dist
        for wheel in *.whl; do
          if [ -f "$wheel" ]; then
            # Only rename optimized wheels - baseline wheels keep standard names for PyPI
            if [ "${{ matrix.cpu_profile }}" = "optimized" ]; then
              base_name="${wheel%.whl}"
              new_name="${base_name}-optimized.whl"
              mv "$wheel" "$new_name"
              echo "Renamed optimized wheel: $wheel -> $new_name"
            else
              echo "Keeping baseline wheel name: $wheel"
            fi
          fi
        done
      shell: bash

    - name: Upload wheels as artifacts
      uses: actions/upload-artifact@v7
      with:
        name: wheels-${{ matrix.os }}-${{ matrix.target }}-${{ matrix.cpu_profile }}
        path: dist

    - name: Upload wheels to release
      run: |
        cd dist
        for wheel in *.whl; do
          if [ -f "$wheel" ]; then
            echo "Uploading wheel: $wheel"
            gh release upload ${{ needs.create-release.outputs.tag }} "$wheel" --clobber
          fi
        done
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Step 6: Build an sdist so unsupported environments still have an install path.
  python-sdist:
    name: Build Python sdist
    runs-on: ubuntu-latest
    needs: [create-release, rust-release-checks]
    steps:
    - uses: actions/checkout@v6.0.3
    - uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Build sdist
      uses: PyO3/maturin-action@v1
      with:
        command: sdist
        args: --out dist
        manylinux: auto
        rust-toolchain: stable

    - name: Upload sdist as artifact
      uses: actions/upload-artifact@v7
      with:
        name: python-sdist
        path: dist/*.tar.gz

    - name: Upload sdist to release
      run: |
        cd dist
        for sdist in *.tar.gz; do
          if [ -f "$sdist" ]; then
            echo "Uploading sdist: $sdist"
            gh release upload ${{ needs.create-release.outputs.tag }} "$sdist" --clobber
          fi
        done
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Step 7: Publish to PyPI after Rust crates are published.
  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [rust-crates, python-wheels, python-sdist]
    permissions:
      id-token: write
    steps:
    - name: Download baseline wheels only
      uses: actions/download-artifact@v8
      with:
        pattern: wheels-*-baseline
        merge-multiple: true
        path: dist

    - name: Download sdist
      uses: actions/download-artifact@v8
      with:
        name: python-sdist
        path: dist

    - name: Verify wheels for PyPI compatibility
      run: |
        cd dist
        echo "Verifying wheels for PyPI publishing..."
        for wheel in *.whl; do
          if [[ "$wheel" == *"-optimized.whl" ]]; then
            echo "Removing optimized wheel from PyPI upload: $wheel"
            rm "$wheel"
          else
            echo "PyPI-compatible wheel: $wheel"
          fi
        done

        wheel_count=$(find . -maxdepth 1 -name '*.whl' | wc -l)
        sdist_count=$(find . -maxdepth 1 -name '*.tar.gz' | wc -l)
        echo "Total wheels for PyPI: $wheel_count"
        echo "Total sdists for PyPI: $sdist_count"
        if [ "$wheel_count" -eq 0 ] && [ "$sdist_count" -eq 0 ]; then
          echo "No Python distributions found for PyPI publishing"
          exit 1
        fi

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/
        skip-existing: true
        print-hash: true

  # Step 8: Finalize release (make it public)
  finalize-release:
    name: Finalize Release
    runs-on: ubuntu-latest
    needs: [create-release, rust-crates, pypi-publish]
    steps:
    - uses: actions/checkout@v6.0.3

    - name: Mark release as published
      run: |
        echo "Finalizing release ${{ needs.create-release.outputs.tag }}..."
        gh release edit ${{ needs.create-release.outputs.tag }} --draft=false
        echo "Release ${{ needs.create-release.outputs.tag }} is now public!"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
