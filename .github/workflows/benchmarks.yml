name: Benchmarks

on:
  push:
    branches: [main, master]
    paths:
      - 'crates/**'
      - 'benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/benchmarks.yml'

  pull_request:
    branches: [main, master]
    paths:
      - 'crates/**'
      - 'benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

  workflow_dispatch:
    inputs:
      full_benchmark:
        description: 'Run full benchmarks (slower, more samples)'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-prefix: rust-bench
          components: rustfmt

      - name: Build benchmarks
        run: cargo bench --no-run

      - name: Run benchmarks
        run: |
          mkdir -p benchmark-results
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.full_benchmark }}" = "true" ]; then
            echo "Running full benchmark suite"
            cargo bench --bench benchmarks 2>&1 | tee benchmark-results/output.txt
          else
            echo "Running quick benchmark suite for CI"
            cargo bench --bench benchmarks -- 'csv_parsing|throughput_metrics' 2>&1 | tee benchmark-results/output.txt
          fi

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: |
            benchmark-results/
            target/criterion/
          retention-days: 30

      - name: Summary
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          grep -E "(csv_parsing|throughput_metrics|time:|thrpt:)" benchmark-results/output.txt | head -80 >> $GITHUB_STEP_SUMMARY || echo "No results found"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
