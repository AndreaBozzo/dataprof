name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'examples/**/*.md'
      - '.gitignore'
      - 'LICENSE*'
      - '.devcontainer/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'examples/**/*.md'
      - '.gitignore'
      - 'LICENSE*'
      - '.devcontainer/**'

# Automatically cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        test-scope: [core, features]
        include:
          - test-scope: core
            test-type: core
            features: ""
            all-features: false
            timeout: 12
            skip-on-draft: false
          - test-scope: features
            test-type: all
            features: ""
            all-features: true
            timeout: 25
            skip-on-draft: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-prefix: rust-ci

      - name: Run ${{ matrix.test-scope }} tests
        if: github.event_name == 'push' || matrix.skip-on-draft == false || github.event.pull_request.draft == false
        uses: ./.github/actions/run-tests
        with:
          test-type: ${{ matrix.test-type }}
          features: ${{ matrix.features }}
          all-features: ${{ matrix.all-features }}
          timeout: ${{ matrix.timeout }}

  quality-checks:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-prefix: rust-ci

      - name: Check formatting
        run: |
          echo "Checking code formatting..."
          cargo fmt --all -- --check
          echo "Formatting check passed"

      - name: Run clippy
        run: |
          echo "Running clippy analysis..."
          cargo clippy --lib --tests --all-features -- -D warnings
          echo "Clippy analysis passed"

      - name: Check documentation
        run: |
          echo "Checking documentation..."
          cargo doc --no-deps --document-private-items
          echo "Documentation check passed"

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-prefix: rust-python

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create virtualenv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install maturin pytest

      - name: Build Python bindings
        run: |
          source .venv/bin/activate
          maturin develop --features python

      - name: Run Python tests
        run: |
          source .venv/bin/activate
          pytest python/tests/ -v -ra

