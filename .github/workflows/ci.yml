name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'examples/**/*.md'
      - '.gitignore'
      - 'LICENSE*'
      - '.devcontainer/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'examples/**/*.md'
      - '.gitignore'
      - 'LICENSE*'
      - '.devcontainer/**'

# Automatically cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        test-scope: [core, features]
        include:
          - test-scope: core
            test-type: core
            features: ""
            all-features: false
            timeout: 12
            skip-on-draft: false
          - test-scope: features
            test-type: all
            features: ""
            all-features: true
            timeout: 30
            skip-on-draft: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-prefix: rust-ci-${{ matrix.test-scope }}

      - name: Run ${{ matrix.test-scope }} tests
        if: github.event_name == 'push' || matrix.skip-on-draft == false || github.event.pull_request.draft == false
        uses: ./.github/actions/run-tests
        with:
          test-type: ${{ matrix.test-type }}
          features: ${{ matrix.features }}
          all-features: ${{ matrix.all-features }}
          timeout: ${{ matrix.timeout }}

  quality-checks:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-prefix: rust-ci

      - name: Check formatting
        run: |
          echo "Checking code formatting..."
          cargo fmt --all -- --check
          echo "Formatting check passed"

      - name: Run clippy
        run: |
          echo "Running clippy analysis..."
          cargo clippy --lib --tests --all-features -- -D warnings
          echo "Clippy analysis passed"

      - name: Check documentation
        run: |
          echo "Checking documentation..."
          cargo doc --no-deps --document-private-items
          echo "Documentation check passed"

      # Guard for issue #364: swallowed errors on decode paths must carry a
      # decode-audit classification comment.
      - name: Check decode-path error handling
        run: python3 .github/scripts/check_decode_audit.py

  feature-checks:
    name: Feature Checks (${{ matrix.scope }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - scope: minimal-facade
            commands: |
              cargo check --no-default-features
              cargo test --test public_api_facade --no-default-features
          - scope: async-streaming
            commands: |
              cargo check --no-default-features --features async-streaming
              cargo test --test public_api_facade --no-default-features --features async-streaming
              cargo test --no-default-features --features async-streaming --test async_streaming -- profile_url
          - scope: all-features-crates
            commands: |
              cargo test --test public_api_facade --all-features
              cargo test -p dataprof-engines --all-features
              cargo test -p dataprof-parquet --all-features
              cargo test -p dataprof-partial --all-features
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-prefix: rust-features-${{ matrix.scope }}

      - name: Run feature checks
        run: ${{ matrix.commands }}

  python-quality:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Check formatting
        run: uv run ruff format --check python/ .github/scripts/

      - name: Lint
        run: uv run ruff check python/ .github/scripts/

      # ty is pre-1.0 (Astral's type checker) but the codebase passes it, so
      # keep it blocking to prevent regressions.
      - name: Type check (ty)
        run: uv run ty check python/

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-prefix: rust-python

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Build Python bindings
        run: uv run maturin develop

      - name: Run Python tests
        run: uv run pytest python/tests/ -v -ra

  python-wheel-smoke:
    # The pytest job runs against an editable build inside the dev environment,
    # so it cannot see packaging mistakes or an accidental dependency on pandas.
    # This one installs the built wheel into a bare venv, the way a user would.
    name: Wheel Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            venv_python: .smoke/bin/python
          - os: macos-latest
            venv_python: .smoke/bin/python
          - os: windows-latest
            venv_python: .smoke/Scripts/python
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          # Keyed per OS: the three legs build different artifacts and must not
          # race for one cache entry.
          cache-prefix: rust-wheel-smoke-${{ matrix.os }}

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Build wheel
        run: uv run maturin build --out dist

      - name: Install the wheel into a bare venv
        # --no-index proves the wheel needs nothing from PyPI: the base package
        # declares no dependencies, and the acceptance snippets must not need one.
        run: |
          python -m venv .smoke
          ${{ matrix.venv_python }} -m pip install --upgrade pip
          ${{ matrix.venv_python }} -m pip install --no-index --find-links dist dataprof

      - name: Run acceptance snippets
        # Run from outside the repo so `import dataprof` cannot resolve to python/.
        run: |
          cp .github/scripts/wheel_smoke.py "${{ runner.temp }}/wheel_smoke.py"
          SMOKE_PYTHON="$PWD/${{ matrix.venv_python }}"
          cd "${{ runner.temp }}"
          "$SMOKE_PYTHON" wheel_smoke.py

  examples-smoke:
    # The examples print real profiler output, so they double as executable docs:
    # a change to a metric's semantics breaks them here rather than in a user's
    # first five minutes. Both languages must agree on the numbers they print.
    name: Examples Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-prefix: rust-examples

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Run Rust examples (default features)
        run: |
          cargo run --example messy_csv_inspection
          cargo run --example etl_quality_gate
          cargo run --example before_after_cleaning

      - name: Build Python bindings
        run: uv run maturin develop

      - name: Run Python examples
        run: |
          uv run python python/examples/messy_csv_inspection.py
          uv run python python/examples/etl_quality_gate.py
          uv run python python/examples/before_after_cleaning.py

  python-async-url-tests:
    name: Python Async URL Tests (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: async-streaming
            features: "python,python-async,async-streaming"
          - variant: parquet-async
            features: "python,python-async,parquet-async"
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-prefix: rust-python-url-${{ matrix.variant }}

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Build Python bindings
        run: uv run maturin develop --features "${{ matrix.features }}"

      - name: Run async URL tests
        run: uv run pytest python/tests/test_async_url_api.py -v -ra

  db-integration-tests:
    name: Database Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dataprof_test
          POSTGRES_USER: dataprof
          POSTGRES_PASSWORD: dev_password_123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dataprof -d dataprof_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password_123
          MYSQL_DATABASE: dataprof_test
          MYSQL_USER: dataprof
          MYSQL_PASSWORD: dev_password_123
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
    env:
      POSTGRES_TEST_URL: "postgresql://dataprof:dev_password_123@localhost:5432/dataprof_test"
      MYSQL_TEST_URL: "mysql://dataprof:dev_password_123@127.0.0.1:3306/dataprof_test"
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-prefix: rust-db
          components: ''

      - name: Initialize test databases
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client default-mysql-client
          PGPASSWORD=dev_password_123 psql -h localhost -U dataprof -d dataprof_test \
            -f .devcontainer/init-scripts/postgres/01-init-schema.sql || true
          mysql -h 127.0.0.1 -u dataprof -pdev_password_123 dataprof_test \
            < .devcontainer/init-scripts/mysql/01-init-schema.sql || true

      # all-db already includes the SQLite feature and its tests. Running a
      # SQLite-only command first forces Cargo to build two feature graphs and
      # can prevent a cold job from reaching the post-job cache save.
      - name: Run Rust database tests (all DBs)
        run: cargo test --test database_integration --features "all-db"

  # The Python extension uses a different Cargo profile and feature graph.
  # Build it in parallel so neither cold build blocks the other's cache save.
  python-db-tests:
    name: Python Database Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-prefix: rust-python-db
          components: ''

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Build Python bindings with database support
        run: uv run maturin develop --features "python,python-async,sqlite"

      - name: Run Python database tests
        run: >-
          uv run pytest
          python/tests/test_database_api.py
          python/tests/test_engine_parity.py::test_sqlite_parity
          -v -ra
