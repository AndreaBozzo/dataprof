name: Deploy Benchmark Reports

on:
  workflow_run:
    workflows: ["Benchmarks"]
    types: [completed]
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download benchmark artifacts
        uses: actions/download-artifact@v8
        with:
          name: benchmark-results
          path: benchmark-reports
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Prepare Pages content
        run: |
          mkdir -p pages-content
          if [ -d "benchmark-reports/target/criterion" ]; then
            cp -r benchmark-reports/target/criterion/* pages-content/
          else
            echo "Error: Criterion reports not found"
            exit 1
          fi

          # Create a small landing page that links into Criterion's report.
          cat > pages-content/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>dataprof Benchmark Reports</title>
            <style>
              body {
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #f8fafc;
                color: #0f172a;
              }
              main {
                max-width: 920px;
                margin: 0 auto;
                padding: 48px 24px;
              }
              h1 {
                margin: 0 0 8px;
                font-size: 32px;
                line-height: 1.15;
              }
              p { color: #475569; }
              nav {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 12px;
                margin-top: 28px;
              }
              a {
                display: block;
                padding: 16px;
                border: 1px solid #cbd5e1;
                border-radius: 6px;
                color: #0f172a;
                background: white;
                text-decoration: none;
              }
              a:hover {
                border-color: #2563eb;
                color: #1d4ed8;
              }
              small { color: #64748b; }
            </style>
          </head>
          <body>
            <main>
              <h1>dataprof Benchmark Reports</h1>
              <p>Criterion reports from the latest successful benchmark workflow on master.</p>
              <nav>
                <a href="report/index.html">
                  Complete Criterion Report<br>
                  <small>Interactive overview and comparisons</small>
                </a>
                <a href="csv_parsing/report/index.html">
                  CSV Parsing<br>
                  <small>Parser and facade throughput</small>
                </a>
                <a href="throughput_metrics/report/index.html">
                  Throughput Metrics<br>
                  <small>Medium dataset rows and bytes per second</small>
                </a>
              </nav>
            </main>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-content

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
