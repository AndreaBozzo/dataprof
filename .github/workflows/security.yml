name: Security

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE*'
  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-prefix: rust-security
          components: rustfmt,clippy

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: Audit default feature graph
        run: cargo deny check

      # The default graph omits optional features that are nonetheless
      # published — notably the database connectors, which pull in the whole
      # SQLx client stack. Auditing only the default build reported green while
      # a shipped feature graph carried an unreviewed advisory (#464), so every
      # feature a user can turn on is checked here too.
      - name: Audit complete feature graph
        run: cargo deny --all-features check

  trivy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.69.2
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4.37.3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy

  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-prefix: rust-security
          components: ''

      - name: Run cargo tree
        run: cargo tree --depth 1