name: 'Run Tests'
description: 'Execute DataProfiler test suite with configurable features'
inputs:
  test-type:
    description: 'Type of tests to run (core, features, integration, all)'
    required: false
    default: 'core'
  features:
    description: 'Cargo features to enable'
    required: false
    default: ''
  all-features:
    description: 'Enable all cargo features'
    required: false
    default: 'false'
  timeout:
    description: 'Test timeout in minutes'
    required: false
    default: '15'

runs:
  using: composite
  steps:
    - name: Run core tests
      if: inputs.test-type == 'core' || inputs.test-type == 'all' || inputs.test-type == 'features'
      shell: bash
      run: |
        echo "🧪 Running core tests..."
        cargo test --lib ${{ inputs.all-features == 'true' && '--all-features' || (inputs.features && format('--features {0}', inputs.features) || '') }}
        echo "✅ Core tests completed"

    - name: Run integration tests
      if: inputs.test-type == 'integration' || inputs.test-type == 'all'
      shell: bash
      run: |
        echo "🔧 Running integration tests..."
        cargo test --test '*' ${{ inputs.all-features == 'true' && '--all-features' || (inputs.features && format('--features {0}', inputs.features) || '') }}
        echo "✅ Integration tests completed"

    - name: Run doc tests
      if: inputs.test-type == 'all'
      shell: bash
      run: |
        echo "📚 Running documentation tests..."
        cargo test --doc ${{ inputs.all-features == 'true' && '--all-features' || (inputs.features && format('--features {0}', inputs.features) || '') }}
        echo "✅ Doc tests completed"

    - name: Test report summary
      shell: bash
      run: |
        echo "📊 Test Summary for ${{ inputs.test-type }} tests"
        echo "Features mode: ${{ inputs.all-features == 'true' && 'all-features' || (inputs.features || 'default') }}"
        echo "Timeout: ${{ inputs.timeout }}m"
        echo "✅ All tests passed successfully"
