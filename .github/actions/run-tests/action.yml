name: 'Run Tests'
description: 'Execute DataProfiler test suite with configurable features'
inputs:
  test-type:
    description: 'Type of tests to run (core, integration, all)'
    required: false
    default: 'core'
  features:
    description: 'Cargo features to enable'
    required: false
    default: ''
  all-features:
    description: 'Enable all cargo features'
    required: false
    default: 'false'
  timeout:
    description: 'Test timeout in minutes'
    required: false
    default: '25'

runs:
  using: composite
  steps:
    - name: Compute cargo feature flags
      id: flags
      shell: bash
      run: |
        if [ "${{ inputs.all-features }}" = "true" ]; then
          echo "cargo_flags=--all-features" >> "$GITHUB_OUTPUT"
        elif [ -n "${{ inputs.features }}" ]; then
          echo "cargo_flags=--features ${{ inputs.features }}" >> "$GITHUB_OUTPUT"
        else
          echo "cargo_flags=" >> "$GITHUB_OUTPUT"
        fi
        echo "timeout_secs=$((60 * ${{ inputs.timeout }}))" >> "$GITHUB_OUTPUT"

    - name: Run core tests
      if: inputs.test-type == 'core' || inputs.test-type == 'all'
      shell: bash
      run: |
        echo "Running core tests (timeout: ${{ inputs.timeout }}m)..."
        timeout ${{ steps.flags.outputs.timeout_secs }} cargo test --lib ${{ steps.flags.outputs.cargo_flags }}
        echo "Core tests completed"

    - name: Run integration tests
      if: inputs.test-type == 'integration' || inputs.test-type == 'all'
      shell: bash
      run: |
        echo "Running integration tests (timeout: ${{ inputs.timeout }}m)..."
        timeout ${{ steps.flags.outputs.timeout_secs }} cargo test --test '*' ${{ steps.flags.outputs.cargo_flags }}
        echo "Integration tests completed"

    - name: Run doc tests
      if: inputs.test-type == 'all'
      shell: bash
      run: |
        echo "Running documentation tests (timeout: ${{ inputs.timeout }}m)..."
        timeout ${{ steps.flags.outputs.timeout_secs }} cargo test --doc ${{ steps.flags.outputs.cargo_flags }}
        echo "Doc tests completed"

    - name: Test report summary
      if: always()
      shell: bash
      run: |
        echo "Test Summary for ${{ inputs.test-type }} tests"
        echo "Features: ${{ steps.flags.outputs.cargo_flags || 'default' }}"
        echo "Timeout: ${{ inputs.timeout }}m"
