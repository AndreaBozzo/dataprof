name: 'Setup Rust with Caching'
description: 'Reliable Rust toolchain setup with caching and fallback'
inputs:
  cache-prefix:
    description: 'Cache key prefix (e.g., "benchmark", "quick")'
    required: false
    default: 'rust'
  components:
    description: 'Additional rustup components (comma-separated)'
    required: false
    default: 'rustfmt,clippy'
  targets:
    description: 'Additional Rust targets to install (e.g., "aarch64-unknown-linux-gnu")'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      id: rust-install
      uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}
      continue-on-error: true
      env:
        RUSTUP_MAX_RETRIES: 3

    - name: Rust toolchain fallback
      if: steps.rust-install.outcome == 'failure'
      shell: bash
      run: |
        echo "Primary Rust installation failed, trying manual installation..."
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        source ~/.cargo/env
        if [ -n "${{ inputs.components }}" ]; then
          rustup component add $(echo "${{ inputs.components }}" | tr ',' ' ')
        fi
        if [ -n "${{ inputs.targets }}" ]; then
          rustup target add $(echo "${{ inputs.targets }}" | tr ',' ' ')
        fi

    - name: Cache Rust dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target/
        key: ${{ inputs.cache-prefix }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-v3
        restore-keys: |
          ${{ inputs.cache-prefix }}-${{ runner.os }}-
          rust-${{ runner.os }}-

    - name: Verify Rust installation
      shell: bash
      run: |
        echo "Rust environment verification..."
        rustc --version
        cargo --version
        echo "Components: $(rustup component list --installed)"
